name: AceProRecorder
options:
  bundleIdPrefix: io.camcontrol
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "8DBK4N5HFL"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    VERSIONING_SYSTEM: apple-generic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    GENERATE_INFOPLIST_FILE: "NO"

targets:
  AceProRecorder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    entitlements:
      path: AceProRecorder/AceProRecorder.entitlements
    sources:
      - path: AceProRecorder
        createIntermediateGroups: true
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
        createIntermediateGroups: true
    resources:
      - AceProRecorder/Assets.xcassets
    dependencies:
      - target: AceProRecorderWidget
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.camcontrol.app
        INFOPLIST_FILE: AceProRecorder/Info.plist

  AceProRecorderWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    entitlements:
      path: AceProRecorderWidget/AceProRecorderWidget.entitlements
    sources:
      - path: AceProRecorderWidget
        createIntermediateGroups: true
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.camcontrol.app.widget
        INFOPLIST_FILE: AceProRecorderWidget/Info.plist
