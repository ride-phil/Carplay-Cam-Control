name: AceProRecorder
options:
  bundleIdPrefix: com.ridephilippines
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""        # Fill in your Apple Team ID
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  AceProRecorder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: AceProRecorder/Info.plist
    entitlements:
      path: AceProRecorder/AceProRecorder.entitlements
    sources:
      - path: AceProRecorder
        createIntermediateGroups: true
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
        createIntermediateGroups: true
    resources:
      - AceProRecorder/Assets.xcassets
    dependencies:
      - target: AceProRecorderWidget
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ridephilippines.aceprorecorder

  AceProRecorderWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: AceProRecorderWidget/Info.plist
    entitlements:
      path: AceProRecorderWidget/AceProRecorderWidget.entitlements
    sources:
      - path: AceProRecorderWidget
        createIntermediateGroups: true
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ridephilippines.aceprorecorder.widget
