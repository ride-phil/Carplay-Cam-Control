name: CamControl
options:
  bundleIdPrefix: io.camcontrol
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "8DBK4N5HFL"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    VERSIONING_SYSTEM: apple-generic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    GENERATE_INFOPLIST_FILE: "NO"

targets:
  CamControl:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CamControl
        createIntermediateGroups: true
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
        createIntermediateGroups: true
    resources:
      - CamControl/Assets.xcassets
    dependencies:
      - target: CamControlWidget
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.camcontrol.app
        INFOPLIST_FILE: CamControl/Info.plist
        CODE_SIGN_ENTITLEMENTS: CamControl/CamControl.entitlements

  CamControlWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CamControlWidget
        createIntermediateGroups: true
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.camcontrol.app.widget
        INFOPLIST_FILE: CamControlWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: CamControlWidget/CamControlWidget.entitlements
