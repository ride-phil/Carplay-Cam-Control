workflows:
  ios-simulator-build:
    name: iOS → Simulator (no signing)
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      vars:
        XCODE_SCHEME: AceProRecorder

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Build for simulator
        script: |
          xcodebuild build \
            -project AceProRecorder.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.camcontrol.app
      groups:
        - app_store_connect    # Codemagic env group must define: APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY
      vars:
        XCODE_SCHEME: AceProRecorder
        APP_APPLE_ID: "6781178941"

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Set build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $((LATEST + 1))

      - name: Build and archive
        script: |
          xcode-project use-profiles
          xcodebuild archive \
            -project AceProRecorder.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath build/AceProRecorder.xcarchive \
            -allowProvisioningUpdates

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/AceProRecorder.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/

    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
